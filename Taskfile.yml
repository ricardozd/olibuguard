# Task runner (https://taskfile.dev). Thin interface over uv, which stays as the
# dependency manager (keeps uv.lock and reproducibility). Run `task` to list tasks.
version: "3"

dotenv:
  - .env   # loads FREQTRADE__* and OLIBUGUARD_CONFIG into every task

vars:
  USERDIR: user_data
  FT_CONFIG: user_data/config.json
  STRATEGY: OlibuguardStrategy
  FT_USER: olibuguard   # API username (matches config.json api_server.username)
  FT_PASS:
    sh: grep FREQTRADE__API_SERVER__PASSWORD .env | cut -d= -f2

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list
    silent: true

  install:
    desc: Install dependencies (core + freqtrade) into the uv venv
    # TA-Lib (system lib) build paths for macOS/Homebrew, needed to build the
    # ta-lib wheel. On Windows install the VC++ Build Tools instead (see README).
    env:
      TA_INCLUDE_PATH: /opt/homebrew/opt/ta-lib/include
      TA_LIBRARY_PATH: /opt/homebrew/opt/ta-lib/lib
      PKG_CONFIG_PATH: /opt/homebrew/opt/ta-lib/lib/pkgconfig
    cmds:
      - uv sync --extra freqtrade

  lint:
    desc: Lint with ruff
    cmds:
      - uv run ruff check .

  format:
    desc: Format with ruff
    cmds:
      - uv run ruff format .

  typecheck:
    desc: Type-check with mypy (strict)
    cmds:
      - uv run mypy

  test:
    desc: Run the test suite (pytest + hypothesis)
    cmds:
      - uv run pytest

  check:
    desc: Run lint, typecheck and tests (the full gate)
    cmds:
      - task: lint
      - task: typecheck
      - task: test

  smoke:
    desc: CLI smoke — read config and self-check the risk gate
    cmds:
      - uv run olibuguard smoke

  run:
    desc: 'Run the bot, e.g. `task run -- --mode paper`'
    cmds:
      - uv run olibuguard run {{.CLI_ARGS}}

  download:
    desc: 'Download OHLCV futures data, e.g. `task download -- --timerange 20241001-20250501`'
    cmds:
      - >-
        uv run freqtrade download-data --userdir {{.USERDIR}} --config {{.FT_CONFIG}}
        --pairs BTC/USDT:USDT ETH/USDT:USDT SOL/USDT:USDT BNB/USDT:USDT
        --timeframes 15m 1h {{.CLI_ARGS}}

  backtest:
    desc: 'Backtest, e.g. `task backtest -- --timerange 20250101-20250401`'
    env:
      OLIBUGUARD_CONFIG: user_data/config.yaml   # ensure RiskGate loads correct whitelist
    cmds:
      - >-
        uv run freqtrade backtesting --userdir {{.USERDIR}} --config {{.FT_CONFIG}}
        --strategy {{.STRATEGY}} --enable-protections {{.CLI_ARGS}}

  hyperopt:
    desc: 'Run hyperopt, e.g. `task hyperopt -- --epochs 500 --timerange 20220101-20260101`'
    env:
      OLIBUGUARD_CONFIG: user_data/config.yaml
    cmds:
      - >-
        uv run freqtrade hyperopt --userdir {{.USERDIR}} --config {{.FT_CONFIG}}
        --strategy {{.STRATEGY}} --enable-protections
        --hyperopt-loss SharpeHyperOptLossDaily
        --spaces buy sell roi -j -1 {{.CLI_ARGS}}

  paper:
    desc: Start Freqtrade in paper (dry-run) mode natively — live market data, no real orders
    env:
      OLIBUGUARD_CONFIG: user_data/config.yaml
    cmds:
      - >-
        uv run freqtrade trade --userdir {{.USERDIR}} --config {{.FT_CONFIG}}
        --strategy {{.STRATEGY}} {{.CLI_ARGS}}

  aws-refresh:
    desc: Export current AWS session credentials into .env so Docker can use them (run after `aws login`)
    cmds:
      - |
        # After `aws login` the default profile IS already the assumed role.
        # We just export its current credentials — no extra assume-role needed.
        CREDS=$(aws configure export-credentials)
        KEY=$(echo "$CREDS"    | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['AccessKeyId'])")
        SECRET=$(echo "$CREDS" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['SecretAccessKey'])")
        TOKEN=$(echo "$CREDS"  | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('SessionToken',''))")
        # Remove any previous STS lines and append fresh ones.
        # Ensure file ends with newline first so credentials don't merge with last line.
        sed -i '' '/^AWS_ACCESS_KEY_ID=/d;/^AWS_SECRET_ACCESS_KEY=/d;/^AWS_SESSION_TOKEN=/d' .env
        [[ -s .env ]] && [[ "$(tail -c1 .env | xxd | head -1)" != *"0a"* ]] && echo "" >> .env
        printf 'AWS_ACCESS_KEY_ID=%s\nAWS_SECRET_ACCESS_KEY=%s\nAWS_SESSION_TOKEN=%s\n' \
          "$KEY" "$SECRET" "$TOKEN" >> .env
        echo "✓ STS credentials written to .env"

  paper-up:
    desc: Build and start in PAPER mode (dry-run, no real orders)
    cmds:
      - FREQTRADE__DRY_RUN=true docker compose up --build -d
      # Freqtrade starts in STOPPED state after a rebuild — wait and kick it to RUNNING.
      - sleep 8 && curl -sf -X POST -u "{{.FT_USER}}:{{.FT_PASS}}" http://localhost:8081/api/v1/start || true

  docker-up:
    desc: Build and start in LIVE mode (real orders on Binance)
    cmds:
      - FREQTRADE__DRY_RUN=false docker compose up --build -d
      - sleep 8 && curl -sf -X POST -u "{{.FT_USER}}:{{.FT_PASS}}" http://localhost:8081/api/v1/start || true

  bot-start:
    desc: Kick bot from STOPPED → RUNNING (if it started in STOPPED state)
    cmds:
      - curl -sf -X POST -u "{{.FT_USER}}:{{.FT_PASS}}" http://localhost:8081/api/v1/start

  docker-down:
    desc: Stop the Docker daemon gracefully
    cmds:
      - docker compose down

  docker-logs:
    desc: Tail bot logs from Docker
    cmds:
      - docker compose logs -f olibuguard

  kill:
    desc: Activate the kill switch — bot stops opening new positions immediately
    cmds:
      - uv run olibuguard kill --user-data-dir {{.USERDIR}} {{.CLI_ARGS}}

  resume:
    desc: Deactivate the kill switch — bot resumes normal operation
    cmds:
      - uv run olibuguard resume --user-data-dir {{.USERDIR}}
