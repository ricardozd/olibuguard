# Deploy the bot in dry-run (paper) mode as a 24/7 daemon.
# Secrets via .env (optional for paper/backtest; mandatory for live). NEVER commit .env.
# For live: set dry_run=false in config.json and export FREQTRADE__EXCHANGE__KEY/SECRET.
services:
  olibuguard:
    build:
      context: .
      dockerfile: Dockerfile
    image: olibuguard:latest
    container_name: olibuguard
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    # AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY / AWS_SESSION_TOKEN are injected
    # via .env (short-lived STS tokens obtained with `task aws-refresh`).
    # No ~/.aws volume needed — boto3 picks up credentials from the environment.
    #
    # Mode override: set FREQTRADE__DRY_RUN=true in .env (or via task paper-up)
    # to run in paper mode without changing config.json.
    environment:
      FREQTRADE__DRY_RUN: ${FREQTRADE__DRY_RUN:-false}
    volumes:
      - "./user_data:/freqtrade/user_data"
    # FreqUI (Freqtrade web interface) — accessible at http://localhost:8081
    # Bound to loopback only: never reachable from the network.
    ports:
      - "127.0.0.1:8081:8081"
    command: >
      trade
      --config /freqtrade/user_data/config.json
      --strategy OlibuguardStrategy
