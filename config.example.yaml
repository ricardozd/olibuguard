# Config de ejemplo. Copia a config.yaml y ajusta.
# Los defaults del código ya son conservadores; esto los hace explícitos.
# Cantidades monetarias como string para preservar precisión (Decimal).

exchange:
  name: binance
  testnet: true
  quote_currency: USDT

timeframe: "1h"

risk:
  # Sizing dinámico: máximo riesgo por operación como fracción del capital real.
  max_risk_per_trade_pct: 0.02      # 2% del equity
  # Caps absolutos (cinturón y tirantes sobre el sizing dinámico).
  max_position_quote: "50"          # máx por operación (quote, p.ej. USDT)
  max_total_exposure_quote: "200"   # máx suma de posiciones abiertas
  max_open_positions: 3
  min_order_quote: "10"             # mínimo nocional (fees > P&L por debajo)
  max_orders_per_minute: 6          # anti runaway
  max_slippage_pct: 0.005           # fracción: 0.005 = 0.5%
  # Circuit breakers (kill-switch automático).
  daily_loss_limit_pct: 0.05        # 5% del equity en el día => STOP
  max_drawdown_pct: 0.10            # 10% desde el pico de equity => STOP
  whitelist:
    - BTC/USDT
    - ETH/USDT
  blacklist: []

ai:
  enabled: false      # default: el bot funciona sin IA (NullAdvisor)
  provider: "null"    # "null" | "bedrock"  (¡comillas! null sin comillas es None en YAML)
  model: ""
  weight: 0.0         # peso que la estrategia da al advisor (0 = lo ignora)
  region: eu-west-1
