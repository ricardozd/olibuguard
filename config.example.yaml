# Example config. Copy to config.yaml and adjust.
# The code defaults are already conservative; this just makes them explicit.
# Money amounts as strings to preserve precision (Decimal).

exchange:
  name: binance
  testnet: true
  quote_currency: USDT

timeframe: "1h"

risk:
  # Dynamic sizing: max risk per trade as a fraction of real capital.
  max_risk_per_trade_pct: 0.02      # 2% of equity
  # Absolute caps (belt and suspenders on top of dynamic sizing).
  max_position_quote: "50"          # max per trade (quote, e.g. USDT)
  max_total_exposure_quote: "200"   # max sum of open positions
  max_open_positions: 3
  min_order_quote: "10"             # min notional (fees > P&L below this)
  max_orders_per_minute: 6          # anti runaway
  max_slippage_pct: 0.005           # fraction: 0.005 = 0.5%
  # Circuit breakers (automatic kill-switch).
  daily_loss_limit_pct: 0.05        # 5% of equity in a day => STOP
  max_drawdown_pct: 0.10            # 10% from the equity peak => STOP
  whitelist:
    - BTC/USDT
    - ETH/USDT
  blacklist: []

ai:
  enabled: false      # default: the bot works without AI (NullAdvisor)
  provider: "null"    # "null" | "bedrock"  (quotes! unquoted null is None in YAML)
  model: anthropic.claude-3-haiku-20240307-v1:0
  weight: 0.0         # weight the strategy gives the advisor (0 = ignores it)
  region: eu-west-1
  # profile: a9e      # named AWS profile from ~/.aws/config (role-based auth).
  #                   # Unset → boto3 default chain (instance role, env vars, …).
  max_tokens: 256
  timeout_seconds: 10.0   # fail-safe: if Bedrock times out, the trade proceeds
